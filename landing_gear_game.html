<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Gear Identification Game</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080f18;
    --surface:  #0e1c2e;
    --card:     #122440;
    --border:   #1e3a5f;
    --accent:   #3a9fd8;
    --amber:    #f4a14a;
    --green:    #3dd68c;
    --red:      #f45a5a;
    --text:     #ddeeff;
    --muted:    #607a96;
    --font-h:   'Barlow Condensed', sans-serif;
    --font-b:   'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-b);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(58,159,216,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58,159,216,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 36px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(14,28,46,.98) 0%, rgba(8,15,24,.85) 100%);
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: var(--font-h);
    font-weight: 900;
    font-size: 1.5rem;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  .hud {
    display: flex; gap: 32px; align-items: center;
  }
  .hud-item { text-align: center; }
  .hud-label {
    font-family: var(--font-h);
    font-size: .65rem; letter-spacing: .15em;
    color: var(--muted); text-transform: uppercase;
  }
  .hud-val {
    font-family: var(--font-h);
    font-size: 1.6rem; font-weight: 700;
    color: var(--accent); line-height: 1;
  }
  #progress-bar-wrap {
    width: 140px; height: 6px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--amber));
    border-radius: 3px;
    transition: width .5s ease;
  }

  /* ── MAIN ── */
  main {
    position: relative; z-index: 5;
    max-width: 1280px; margin: 0 auto;
    padding: 32px 36px 60px;
  }

  /* ── ROUND HEADER ── */
  .round-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 28px;
  }
  .round-tag {
    font-family: var(--font-h);
    font-size: .7rem; letter-spacing: .2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .round-title {
    font-family: var(--font-h);
    font-size: 2rem; font-weight: 700; letter-spacing: .05em;
    color: var(--text); text-transform: uppercase;
  }
  .round-title em { color: var(--accent); font-style: normal; }
  .instruction-pill {
    font-size: .8rem; color: var(--muted);
    border: 1px solid var(--border);
    padding: 7px 16px; border-radius: 20px;
    background: var(--surface);
  }
  .instruction-pill strong { color: var(--accent); }

  /* ── GAME LAYOUT ── */
  .game-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  /* ── PHOTO PANEL ── */
  .panel-label {
    font-family: var(--font-h);
    font-size: .65rem; letter-spacing: .2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }

  .photo-pool {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .photo-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: grab;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    background: var(--card);
    position: relative;
    aspect-ratio: 4/3;
    user-select: none;
  }
  .photo-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(58,159,216,.25);
  }
  .photo-card.dragging {
    opacity: .45;
    transform: scale(.97);
    cursor: grabbing;
  }
  .photo-card.matched {
    opacity: .25;
    pointer-events: none;
    filter: grayscale(.6);
  }

  .photo-card img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    pointer-events: none;
  }

  /* Photo placeholder (before real image added) */
  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    background: var(--surface);
    pointer-events: none;
  }
  .photo-placeholder .ph-num {
    font-family: var(--font-h);
    font-size: 2.2rem; font-weight: 900;
    color: var(--border);
    line-height: 1;
  }
  .photo-placeholder .ph-aircraft {
    font-size: .72rem; color: var(--muted);
    text-align: center; padding: 0 12px;
    font-family: var(--font-h);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .photo-placeholder .ph-icon {
    font-size: 1.8rem; opacity: .3;
  }

  .photo-num-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--accent);
    color: var(--bg);
    font-family: var(--font-h); font-weight: 700;
    font-size: .75rem; letter-spacing: .1em;
    padding: 3px 8px; border-radius: 4px;
    pointer-events: none;
  }

  /* ── DESCRIPTION CARDS ── */
  .desc-pool {
    display: flex; flex-direction: column; gap: 14px;
  }

  .desc-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    background: var(--card);
    transition: border-color .15s, box-shadow .15s, background .15s;
    position: relative;
    min-height: 90px;
  }
  .desc-card.drag-over {
    border-color: var(--accent);
    background: rgba(58,159,216,.08);
    box-shadow: 0 0 0 3px rgba(58,159,216,.2), inset 0 0 20px rgba(58,159,216,.04);
  }
  .desc-card.correct {
    border-color: var(--green);
    background: rgba(61,214,140,.07);
    animation: correctPulse .5s ease;
  }
  .desc-card.wrong {
    border-color: var(--red);
    background: rgba(244,90,90,.07);
    animation: wrongShake .4s ease;
  }
  .desc-card.matched-final {
    border-color: var(--green);
    background: rgba(61,214,140,.05);
  }

  @keyframes correctPulse {
    0%   { box-shadow: 0 0 0 0 rgba(61,214,140,.6); }
    50%  { box-shadow: 0 0 0 12px rgba(61,214,140,0); }
    100% { box-shadow: none; }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
  }

  .desc-gear-type {
    font-family: var(--font-h);
    font-size: .65rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase;
    color: var(--amber); margin-bottom: 6px;
  }
  .desc-config {
    font-size: .85rem; color: var(--text);
    line-height: 1.45; margin-bottom: 5px;
    font-weight: 500;
  }
  .desc-absorption {
    font-size: .75rem; color: var(--muted); line-height: 1.4;
  }
  .desc-absorption strong { color: var(--accent); }

  .drop-zone-hint {
    position: absolute; inset: 0;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-h); font-size: .85rem; letter-spacing: .1em;
    color: var(--accent); opacity: 0;
    pointer-events: none;
    text-transform: uppercase;
    transition: opacity .15s;
  }
  .desc-card.drag-over .drop-zone-hint { opacity: 1; }
  .desc-card.drag-over .desc-inner { opacity: .2; }

  .matched-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--green); color: var(--bg);
    font-family: var(--font-h); font-size: .7rem; font-weight: 700;
    padding: 3px 9px; border-radius: 4px; letter-spacing: .05em;
    display: none;
  }
  .desc-card.matched-final .matched-badge { display: block; }

  /* ── FEEDBACK TOAST ── */
  #feedback-toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 28px;
    font-family: var(--font-h); font-size: 1.1rem; font-weight: 600; letter-spacing: .05em;
    color: var(--text);
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 100;
    text-align: center;
    min-width: 280px;
  }
  #feedback-toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }
  #feedback-toast.correct { border-color: var(--green); color: var(--green); }
  #feedback-toast.wrong   { border-color: var(--red);   color: var(--red); }

  /* ── SCORE POPUP ── */
  #score-modal {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,15,24,.92);
    backdrop-filter: blur(12px);
    display: none; align-items: center; justify-content: center;
  }
  #score-modal.show { display: flex; }
  .score-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 60px;
    text-align: center;
    max-width: 480px; width: 90%;
    box-shadow: 0 30px 80px rgba(0,0,0,.7);
  }
  .score-headline {
    font-family: var(--font-h); font-size: 1rem;
    letter-spacing: .2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .score-big {
    font-family: var(--font-h); font-size: 5rem; font-weight: 900;
    line-height: 1; margin-bottom: 8px;
  }
  .score-big.perfect { color: var(--green); }
  .score-big.good    { color: var(--accent); }
  .score-big.ok      { color: var(--amber); }
  .score-sub {
    font-size: 1rem; color: var(--muted); margin-bottom: 32px;
  }
  .score-breakdown {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; margin-bottom: 36px;
  }
  .score-stat {
    background: var(--card); border-radius: 10px; padding: 14px;
  }
  .score-stat-val {
    font-family: var(--font-h); font-size: 2rem; font-weight: 700;
    line-height: 1;
  }
  .score-stat-val.g { color: var(--green); }
  .score-stat-val.r { color: var(--red); }
  .score-stat-label { font-size: .75rem; color: var(--muted); margin-top: 4px; }
  .btn-restart {
    background: var(--accent); color: var(--bg);
    font-family: var(--font-h); font-size: 1.1rem; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    border: none; border-radius: 10px;
    padding: 14px 40px; cursor: pointer;
    transition: opacity .15s, transform .15s;
    width: 100%;
  }
  .btn-restart:hover { opacity: .85; transform: translateY(-2px); }

  /* ── ROUND COMPLETE BANNER ── */
  #round-complete {
    display: none;
    background: linear-gradient(135deg, rgba(61,214,140,.12), rgba(58,159,216,.08));
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 20px 28px;
    margin-bottom: 24px;
    font-family: var(--font-h);
    font-size: 1rem; color: var(--green);
    letter-spacing: .08em; text-transform: uppercase;
    text-align: center;
  }

  /* ── SECTION DIVIDER ── */
  .section-divider {
    display: flex; align-items: center; gap: 14px;
    margin: 36px 0 20px;
  }
  .sd-bar { flex: 1; height: 1px; background: var(--border); }
  .sd-label {
    font-family: var(--font-h); font-size: .7rem;
    letter-spacing: .18em; color: var(--muted); text-transform: uppercase;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Landing Gear <span>ID</span></div>
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score-display">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Correct</div>
      <div class="hud-val" id="correct-display" style="color:var(--green)">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Errors</div>
      <div class="hud-val" id="errors-display" style="color:var(--red)">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Progress</div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>
</header>

<main>
  <div id="round-complete">✓ All matched! Loading next round...</div>

  <div class="round-header">
    <div>
      <div class="round-tag" id="round-tag">Round 1 of 3</div>
      <div class="round-title" id="round-title">Conventional &amp; <em>Tricycle</em></div>
    </div>
    <div class="instruction-pill"><strong>Drag</strong> a photo onto its matching description</div>
  </div>

  <div class="game-layout">
    <div>
      <div class="panel-label">✈ Aircraft Photos — drag to match</div>
      <div class="photo-pool" id="photo-pool"></div>
    </div>
    <div>
      <div class="panel-label">◈ Gear Descriptions — drop zone</div>
      <div class="desc-pool" id="desc-pool"></div>
    </div>
  </div>
</main>

<!-- Feedback toast -->
<div id="feedback-toast"></div>

<!-- Score modal -->
<div id="score-modal">
  <div class="score-box">
    <div class="score-headline">Game Complete</div>
    <div class="score-big" id="final-pct"></div>
    <div class="score-sub" id="final-msg"></div>
    <div class="score-breakdown">
      <div class="score-stat">
        <div class="score-stat-val g" id="final-correct"></div>
        <div class="score-stat-label">Correct matches</div>
      </div>
      <div class="score-stat">
        <div class="score-stat-val r" id="final-errors"></div>
        <div class="score-stat-label">Wrong attempts</div>
      </div>
    </div>
    <button class="btn-restart" onclick="startGame()">Play Again</button>
  </div>
</div>

<script>

//  e.g.  img: 'photos/dhc3_wheeled.jpg'

const ROUND_META = [
  { label: 'Round 1 of 3', title: 'Conventional &amp; <em>Tricycle</em>' },
  { label: 'Round 2 of 3', title: 'Tandem, Multi-Bogey &amp; <em>Nosewheel</em>' },
  { label: 'Round 3 of 3', title: 'Float, Amphib, Ski &amp; <em>Ski-Wheel</em>' },
];

// ════════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════════
let currentRound = 1;
let score = 0;
let totalCorrect = 0;
let totalErrors = 0;
let roundMatchedCount = 0;
let draggingId = null;
let toastTimer = null;

function getRoundCards() {
  return ALL_CARDS.filter(c => c.round === currentRound);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════
function renderRound() {
  const cards = getRoundCards();
  const shuffledPhotos = shuffle([...cards]);
  const shuffledDescs  = shuffle([...cards]);

  document.getElementById('round-tag').textContent = ROUND_META[currentRound-1].label;
  document.getElementById('round-title').innerHTML = ROUND_META[currentRound-1].title;
  document.getElementById('round-complete').style.display = 'none';
  roundMatchedCount = 0;

  // Photos
  const photoPool = document.getElementById('photo-pool');
  photoPool.innerHTML = '';
  shuffledPhotos.forEach(card => {
    const el = document.createElement('div');
    el.className = 'photo-card';
    el.draggable = true;
    el.dataset.id = card.id;

    if (card.img) {
      const img = document.createElement('img');
      img.src = card.img;
      img.alt = card.aircraft;
      el.appendChild(img);
    } else {
      el.innerHTML = `
        <div class="photo-placeholder">
          <div class="ph-icon">📷</div>
          <div class="ph-num">${shuffledPhotos.indexOf(card) + 1}</div>
          <div class="ph-aircraft">${card.aircraft}</div>
        </div>`;
    }

    el.innerHTML += `<div class="photo-num-badge">${card.gearType.split('(')[0].split('/')[0].trim()}</div>`;

    el.addEventListener('dragstart', e => {
      draggingId = card.id;
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
    });

    // Touch support
    el.addEventListener('touchstart', handleTouchStart, { passive: true });
    el.addEventListener('touchmove',  handleTouchMove,  { passive: false });
    el.addEventListener('touchend',   handleTouchEnd,   { passive: true });

    photoPool.appendChild(el);
  });

  // Descriptions
  const descPool = document.getElementById('desc-pool');
  descPool.innerHTML = '';
  shuffledDescs.forEach(card => {
    const el = document.createElement('div');
    el.className = 'desc-card';
    el.dataset.id = card.id;
    el.innerHTML = `
      <div class="desc-inner">
        <div class="desc-gear-type">${card.gearType}</div>
        <div class="desc-config">${card.config}</div>
        <div class="desc-absorption"><strong>Shock absorption:</strong> ${card.absorption}</div>
      </div>
      <div class="drop-zone-hint">Drop here</div>
      <div class="matched-badge">✓ Matched</div>
    `;

    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      handleDrop(card.id, el);
    });

    descPool.appendChild(el);
  });
}

// ════════════════════════════════════════════════════════════
//  DRAG & DROP LOGIC
// ════════════════════════════════════════════════════════════
function handleDrop(targetDescId, descEl) {
  if (!draggingId) return;
  if (descEl.classList.contains('matched-final')) return;

  if (draggingId === targetDescId) {
    // ✅ CORRECT
    totalCorrect++;
    score += 10;
    roundMatchedCount++;

    // Mark photo as matched
    const photoEl = document.querySelector(`.photo-card[data-id="${draggingId}"]`);
    if (photoEl) photoEl.classList.add('matched');

    // Mark desc as matched
    descEl.classList.add('correct');
    setTimeout(() => {
      descEl.classList.remove('correct');
      descEl.classList.add('matched-final');
    }, 600);

    showToast('✓ Correct!', 'correct');
    updateHUD();

    const roundCards = getRoundCards();
    if (roundMatchedCount === roundCards.length) {
      setTimeout(nextRound, 900);
    }

  } else {
    // ✗ WRONG
    totalErrors++;
    score = Math.max(0, score - 3);
    descEl.classList.add('wrong');
    setTimeout(() => descEl.classList.remove('wrong'), 500);
    showToast('✗ Not quite — try again', 'wrong');
    updateHUD();
  }

  draggingId = null;
}

function nextRound() {
  if (currentRound < 3) {
    document.getElementById('round-complete').style.display = 'block';
    currentRound++;
    setTimeout(() => renderRound(), 1000);
  } else {
    showFinalScore();
  }
}

// ════════════════════════════════════════════════════════════
//  TOUCH DRAG (mobile/tablet)
// ════════════════════════════════════════════════════════════
let touchEl = null;
let touchClone = null;

function handleTouchStart(e) {
  touchEl = e.currentTarget;
  draggingId = touchEl.dataset.id;
  const rect = touchEl.getBoundingClientRect();
  touchClone = touchEl.cloneNode(true);
  touchClone.style.cssText = `
    position:fixed; left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; height:${rect.height}px;
    opacity:.8; pointer-events:none; z-index:999;
    border-radius:10px; transform:scale(1.05);
    box-shadow:0 12px 40px rgba(0,0,0,.5);
    transition:none;
  `;
  document.body.appendChild(touchClone);
  touchEl.classList.add('dragging');
}

function handleTouchMove(e) {
  if (!touchClone) return;
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchClone.offsetWidth / 2) + 'px';
  touchClone.style.top  = (t.clientY - touchClone.offsetHeight / 2) + 'px';

  // Highlight drop zone
  document.querySelectorAll('.desc-card').forEach(el => el.classList.remove('drag-over'));
  touchClone.style.display = 'none';
  const hit = document.elementFromPoint(t.clientX, t.clientY);
  touchClone.style.display = '';
  const descEl = hit && hit.closest('.desc-card');
  if (descEl) descEl.classList.add('drag-over');
}

function handleTouchEnd(e) {
  if (!touchClone) return;
  touchEl.classList.remove('dragging');
  const t = e.changedTouches[0];
  touchClone.remove(); touchClone = null;

  document.querySelectorAll('.desc-card').forEach(el => el.classList.remove('drag-over'));

  const hit = document.elementFromPoint(t.clientX, t.clientY);
  const descEl = hit && hit.closest('.desc-card');
  if (descEl) handleDrop(descEl.dataset.id, descEl);
  touchEl = null;
}

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('correct-display').textContent = totalCorrect;
  document.getElementById('errors-display').textContent = totalErrors;
  document.getElementById('progress-bar').style.width = (totalCorrect / 12 * 100) + '%';
}

function showToast(msg, type) {
  const t = document.getElementById('feedback-toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'show ' + type;
  toastTimer = setTimeout(() => { t.className = ''; }, 2000);
}

function showFinalScore() {
  const pct = Math.round(totalCorrect / 12 * 100);
  const el = document.getElementById('final-pct');
  el.textContent = pct + '%';
  el.className = 'score-big ' + (pct === 100 ? 'perfect' : pct >= 75 ? 'good' : 'ok');
  document.getElementById('final-msg').textContent =
    pct === 100 ? 'Perfect score — zero errors!' :
    pct >= 75   ? 'Strong performance. Review any wrong attempts.' :
                  'Keep practising — review the reference table.';
  document.getElementById('final-correct').textContent = totalCorrect;
  document.getElementById('final-errors').textContent  = totalErrors;
  document.getElementById('score-modal').classList.add('show');
}

function startGame() {
  currentRound = 1;
  score = 0;
  totalCorrect = 0;
  totalErrors = 0;
  draggingId = null;
  document.getElementById('score-modal').classList.remove('show');
  updateHUD();
  renderRound();
}

// ── INIT ──────────────────────────────────────────────────────
startGame();
</script>
